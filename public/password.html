<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — DevTools</title>
<link rel="stylesheet" href="style.css">
<style>
.pw-output {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.pw-text {
  flex: 1;
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.04em;
  overflow-x: auto;
  white-space: nowrap;
  word-break: break-all;
}
.toggle-row {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin: 20px 0;
}
.toggle-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
}
.toggle-label { font-size: 13px; color: var(--text-dim); font-weight: 500; }
.toggle-sub { font-size: 11px; color: var(--muted); margin-top: 1px; font-family: var(--font-mono); }
.toggle {
  position: relative;
  width: 38px; height: 22px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--border);
  border-radius: 22px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 3px; top: 3px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

.length-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
}
.length-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  outline: none;
}
.length-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
}
.length-val {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  width: 36px;
  text-align: right;
}
.bulk-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 280px;
  overflow-y: auto;
}
.bulk-item {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-dim);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 14px;
  cursor: pointer;
  transition: border-color var(--transition);
}
.bulk-item:hover { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>
<div class="shell">
  <div id="nav-root"></div>
  <main class="main">
    <div class="topbar">
      <div class="topbar-inner">
        <div>
          <div class="page-title">Password Generator</div>
          <div class="page-subtitle">Generate cryptographically secure passwords</div>
        </div>
      </div>
    </div>
    <div class="content">
      <div class="grid-2" style="align-items:start; gap:20px;">
        <div>
          <div class="pw-output">
            <div class="pw-text" id="pw-display">—</div>
            <button class="btn btn-ghost" onclick="copyPw()" title="Copy">⧉</button>
          </div>

          <div class="strength-bar">
            <div class="strength-fill" id="strength-fill" style="width:0%;background:var(--muted);"></div>
          </div>
          <div class="flex justify-between items-center mt-2 mb-3">
            <span class="text-sm text-muted">Strength</span>
            <span class="badge" id="strength-badge">—</span>
          </div>

          <label>Password Length</label>
          <div class="length-row">
            <input type="range" class="length-slider" id="len-slider" min="4" max="128" value="20" oninput="lenUpdate()">
            <div class="length-val" id="len-val">20</div>
          </div>

          <div class="toggle-row">
            <div class="toggle-item">
              <div><div class="toggle-label">Uppercase</div><div class="toggle-sub">A–Z</div></div>
              <label class="toggle"><input type="checkbox" id="upper" checked onchange="generate()"><span class="toggle-slider"></span></label>
            </div>
            <div class="toggle-item">
              <div><div class="toggle-label">Lowercase</div><div class="toggle-sub">a–z</div></div>
              <label class="toggle"><input type="checkbox" id="lower" checked onchange="generate()"><span class="toggle-slider"></span></label>
            </div>
            <div class="toggle-item">
              <div><div class="toggle-label">Numbers</div><div class="toggle-sub">0–9</div></div>
              <label class="toggle"><input type="checkbox" id="nums" checked onchange="generate()"><span class="toggle-slider"></span></label>
            </div>
            <div class="toggle-item">
              <div><div class="toggle-label">Symbols</div><div class="toggle-sub">!@#$%^&*</div></div>
              <label class="toggle"><input type="checkbox" id="syms" onchange="generate()"><span class="toggle-slider"></span></label>
            </div>
          </div>

          <div class="flex gap-2">
            <button class="btn btn-primary w-full" onclick="generate()">↻ Generate</button>
          </div>
        </div>

        <div>
          <div class="card">
            <div class="card-title flex justify-between items-center">
              Bulk Generate
              <div class="flex gap-2">
                <select id="bulk-count" style="width:auto;padding:4px 28px 4px 10px;font-size:12px;" onchange="">
                  <option>5</option><option>10</option><option>20</option>
                </select>
                <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px;" onclick="generateBulk()">Generate</button>
              </div>
            </div>
            <div class="bulk-list" id="bulk-list">
              <div class="text-muted text-sm" style="padding:8px 0;">Click Generate to create a batch</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="nav.js"></script>
<script>
document.getElementById('nav-root').innerHTML = renderNav('password.html');

const UPPER='ABCDEFGHIJKLMNOPQRSTUVWXYZ', LOWER='abcdefghijklmnopqrstuvwxyz',
      NUMS='0123456789', SYMS='!@#$%^&*()-_=+[]{}|;:,.<>?';

function getChars() {
  let c = '';
  if (document.getElementById('upper').checked) c += UPPER;
  if (document.getElementById('lower').checked) c += LOWER;
  if (document.getElementById('nums').checked)  c += NUMS;
  if (document.getElementById('syms').checked)  c += SYMS;
  return c || LOWER;
}

function secureRand(max) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function genPw(len) {
  const chars = getChars();
  return Array.from({length: len}, () => chars[secureRand(chars.length)]).join('');
}

function lenUpdate() {
  document.getElementById('len-val').textContent = document.getElementById('len-slider').value;
  generate();
}

function getStrength(pw) {
  let score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 16) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[a-z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  return score;
}

function generate() {
  const len = +document.getElementById('len-slider').value;
  const pw = genPw(len);
  document.getElementById('pw-display').textContent = pw;
  const s = getStrength(pw);
  const fill = document.getElementById('strength-fill');
  const badge = document.getElementById('strength-badge');
  const pct = Math.min(100, Math.round(s / 6 * 100));
  fill.style.width = pct + '%';
  if (s <= 2)      { fill.style.background='var(--danger)';  badge.className='badge badge-danger';  badge.textContent='Weak'; }
  else if (s <= 4) { fill.style.background='var(--warning)'; badge.className='badge badge-warning'; badge.textContent='Fair'; }
  else             { fill.style.background='var(--success)'; badge.className='badge badge-success'; badge.textContent='Strong'; }
}

function copyPw() {
  const t = document.getElementById('pw-display').textContent;
  navigator.clipboard.writeText(t).then(() => showToast('Copied!', 'success'));
}

function generateBulk() {
  const count = +document.getElementById('bulk-count').value;
  const len = +document.getElementById('len-slider').value;
  const list = document.getElementById('bulk-list');
  list.innerHTML = Array.from({length:count}, () => {
    const pw = genPw(len);
    return `<div class="bulk-item" onclick="navigator.clipboard.writeText(this.textContent).then(()=>showToast('Copied!','success'))">${pw}</div>`;
  }).join('');
}

generate();
</script>
</body>
</html>
