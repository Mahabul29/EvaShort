<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converter — DevTools</title>
<link rel="stylesheet" href="style.css">
<style>
.category-tabs {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px;
}
.tab-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.tab-btn:hover { color: var(--text); border-color: var(--muted); }
.tab-btn.active { background: var(--accent); color: #fff; border-color: transparent; }
.convert-row {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: end; margin-bottom: 16px;
}
.swap-btn {
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  font-size: 18px; cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 0;
  height: 42px; display:flex; align-items:center; justify-content:center;
}
.swap-btn:hover { color: var(--text); border-color: var(--accent); }
.result-display {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin-top: 16px;
}
.result-val {
  font-family: var(--font-mono);
  font-size: 32px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
}
.result-unit { font-size: 14px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>
<div class="shell">
  <div id="nav-root"></div>
  <main class="main">
    <div class="topbar">
      <div class="topbar-inner">
        <div>
          <div class="page-title">Unit Converter</div>
          <div class="page-subtitle">Length, weight, temperature, data, and more</div>
        </div>
      </div>
    </div>
    <div class="content">
      <div class="category-tabs" id="tabs"></div>
      <div class="card" style="max-width:560px;">
        <div class="convert-row">
          <div>
            <label>From</label>
            <select id="from-unit" onchange="convert()"></select>
          </div>
          <button class="swap-btn" onclick="swap()">⇌</button>
          <div>
            <label>To</label>
            <select id="to-unit" onchange="convert()"></select>
          </div>
        </div>
        <div>
          <label>Value</label>
          <input type="number" id="from-val" value="1" oninput="convert()">
        </div>
        <div class="result-display">
          <div class="result-val" id="result-val">—</div>
          <div class="result-unit" id="result-unit"></div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="nav.js"></script>
<script>
document.getElementById('nav-root').innerHTML = renderNav('converter.html');

const CATS = {
  Length: {
    units: ['Meter','Kilometer','Mile','Yard','Foot','Inch','Centimeter','Millimeter','Nautical Mile'],
    toBase: [1, 1000, 1609.344, 0.9144, 0.3048, 0.0254, 0.01, 0.001, 1852]
  },
  Weight: {
    units: ['Kilogram','Gram','Pound','Ounce','Tonne','Stone'],
    toBase: [1, 0.001, 0.453592, 0.0283495, 1000, 6.35029]
  },
  Temperature: {
    units: ['Celsius','Fahrenheit','Kelvin'],
    special: true
  },
  Data: {
    units: ['Byte','Kilobyte','Megabyte','Gigabyte','Terabyte','Bit','Kilobit','Megabit'],
    toBase: [1, 1024, 1048576, 1073741824, 1099511627776, 0.125, 128, 131072]
  },
  Speed: {
    units: ['m/s','km/h','mph','Knot','ft/s'],
    toBase: [1, 0.277778, 0.44704, 0.514444, 0.3048]
  },
  Area: {
    units: ['m²','km²','Hectare','Acre','ft²','in²','mi²'],
    toBase: [1, 1e6, 10000, 4046.856, 0.092903, 0.00064516, 2589988]
  },
  Volume: {
    units: ['Liter','Milliliter','Gallon (US)','Quart','Pint','Cup','Fluid oz','m³'],
    toBase: [1, 0.001, 3.78541, 0.946353, 0.473176, 0.236588, 0.0295735, 1000]
  },
  Time: {
    units: ['Second','Minute','Hour','Day','Week','Month','Year'],
    toBase: [1, 60, 3600, 86400, 604800, 2629800, 31557600]
  },
};

let activeCat = 'Length';

function buildTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = Object.keys(CATS).map(k =>
    `<button class="tab-btn${k===activeCat?' active':''}" onclick="setcat('${k}')">${k}</button>`
  ).join('');
}

function setcat(k) { activeCat = k; buildTabs(); buildUnits(); convert(); }

function buildUnits() {
  const units = CATS[activeCat].units;
  ['from-unit','to-unit'].forEach((id, i) => {
    const s = document.getElementById(id);
    s.innerHTML = units.map((u,j)=>`<option value="${j}">${u}</option>`).join('');
    s.value = i === 1 ? 1 : 0;
  });
}

function convert() {
  const from = +document.getElementById('from-unit').value;
  const to   = +document.getElementById('to-unit').value;
  const val  = +document.getElementById('from-val').value;
  const cat  = CATS[activeCat];
  let result;
  if (cat.special) { // Temperature
    let c;
    if (from===0) c = val;
    else if (from===1) c = (val-32)*5/9;
    else c = val - 273.15;
    if (to===0) result = c;
    else if (to===1) result = c*9/5+32;
    else result = c + 273.15;
  } else {
    result = val * cat.toBase[from] / cat.toBase[to];
  }
  const fmt = Math.abs(result) >= 1e6 || (Math.abs(result) < 0.001 && result !== 0)
    ? result.toExponential(4) : +result.toFixed(8) + '';
  document.getElementById('result-val').textContent = fmt;
  document.getElementById('result-unit').textContent = `${val} ${cat.units[from]} = ${fmt} ${cat.units[to]}`;
}

function swap() {
  const f = document.getElementById('from-unit'), t = document.getElementById('to-unit');
  [f.value, t.value] = [t.value, f.value];
  convert();
}

buildTabs(); buildUnits(); convert();
</script>
</body>
</html>
