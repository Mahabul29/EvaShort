<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code — DevTools</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
.qr-preview {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  border-radius: var(--radius-lg);
  padding: 24px;
  min-height: 240px;
  border: 1px solid var(--border);
  margin: 0 auto;
  max-width: 260px;
}
#qr-canvas canvas, #qr-canvas img { display:block; }
.color-row { display:flex; gap:12px; align-items:end; }
.color-row > div { flex:1; }
input[type="color"] {
  width:100%; height:40px;
  border-radius:var(--radius);
  border:1px solid var(--border);
  background:var(--bg);
  cursor:pointer;
  padding:3px;
}
.preset-row {
  display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;
}
.preset-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid var(--border);
  transition: transform var(--transition);
}
.preset-dot:hover { transform: scale(1.15); border-color: var(--accent); }
.size-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: var(--radius);
  color: var(--muted);
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.size-btn.active, .size-btn:hover { background: var(--accent); color: #fff; border-color: transparent; }
</style>
</head>
<body>
<div class="shell">
  <div id="nav-root"></div>
  <main class="main">
    <div class="topbar">
      <div class="topbar-inner">
        <div>
          <div class="page-title">QR Code Generator</div>
          <div class="page-subtitle">Generate QR codes from text, URLs, or data</div>
        </div>
      </div>
    </div>
    <div class="content">
      <div class="grid-2" style="align-items:start; gap:20px;">
        <div>
          <div class="card">
            <div style="margin-bottom:16px;">
              <label>Content</label>
              <textarea id="qr-input" rows="4" placeholder="Enter text, URL, email, phone…" oninput="generate()" style="min-height:90px;">https://example.com</textarea>
            </div>

            <div style="margin-bottom:16px;">
              <label>Type</label>
              <select id="qr-type" onchange="autoFill()">
                <option value="text">Plain Text</option>
                <option value="url">URL</option>
                <option value="email">Email</option>
                <option value="phone">Phone</option>
                <option value="sms">SMS</option>
                <option value="wifi">Wi-Fi</option>
                <option value="vcard">vCard</option>
              </select>
            </div>

            <div id="wifi-fields" style="display:none; margin-bottom:16px;">
              <div class="grid-2" style="margin-bottom:12px;">
                <div><label>Network Name (SSID)</label><input type="text" id="wifi-ssid" oninput="generate()" placeholder="MyNetwork"></div>
                <div><label>Password</label><input type="password" id="wifi-pass" oninput="generate()" placeholder="••••••••"></div>
              </div>
              <div><label>Security</label>
                <select id="wifi-sec" onchange="generate()">
                  <option>WPA</option><option>WEP</option><option>nopass</option>
                </select>
              </div>
            </div>

            <div class="divider"></div>

            <div style="margin-bottom:14px;">
              <label>Error Correction</label>
              <select id="qr-ecc" onchange="generate()">
                <option value="L">Low (L) — 7% recovery</option>
                <option value="M" selected>Medium (M) — 15% recovery</option>
                <option value="Q">Quartile (Q) — 25% recovery</option>
                <option value="H">High (H) — 30% recovery</option>
              </select>
            </div>

            <div style="margin-bottom:14px;">
              <label>Size</label>
              <div class="flex gap-2" id="size-btns">
                <button class="size-btn" data-size="128" onclick="setSize(128,this)">Small</button>
                <button class="size-btn active" data-size="200" onclick="setSize(200,this)">Medium</button>
                <button class="size-btn" data-size="300" onclick="setSize(300,this)">Large</button>
                <button class="size-btn" data-size="512" onclick="setSize(512,this)">XL</button>
              </div>
            </div>

            <div class="color-row" style="margin-bottom:16px;">
              <div>
                <label>Foreground</label>
                <input type="color" id="qr-fg" value="#000000" oninput="generate()">
              </div>
              <div>
                <label>Background</label>
                <input type="color" id="qr-bg" value="#ffffff" oninput="generate()">
              </div>
            </div>

            <div>
              <label>Presets</label>
              <div class="preset-row">
                <div class="preset-dot" style="background:#000" title="Classic" onclick="applyPreset('#000','#fff')"></div>
                <div class="preset-dot" style="background:#6366F1" title="Indigo" onclick="applyPreset('#6366F1','#ffffff')"></div>
                <div class="preset-dot" style="background:#0f172a" title="Navy" onclick="applyPreset('#0f172a','#f8fafc')"></div>
                <div class="preset-dot" style="background:#047857" title="Forest" onclick="applyPreset('#047857','#ecfdf5')"></div>
                <div class="preset-dot" style="background:#b91c1c" title="Red" onclick="applyPreset('#b91c1c','#fff1f2')"></div>
                <div class="preset-dot" style="background:#92400e" title="Amber" onclick="applyPreset('#92400e','#fffbeb')"></div>
              </div>
            </div>
          </div>
        </div>

        <div>
          <div class="card" style="text-align:center;">
            <div class="card-title">Preview</div>
            <div class="qr-preview">
              <div id="qr-canvas"></div>
            </div>
            <div class="flex gap-2 mt-4" style="justify-content:center;">
              <button class="btn btn-primary" onclick="download('png')">Download PNG</button>
              <button class="btn btn-ghost" onclick="download('svg')">Download SVG</button>
              <button class="btn btn-ghost" onclick="copyImg()">Copy</button>
            </div>
            <div class="text-muted text-xs mt-3" id="qr-info"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="nav.js"></script>
<script>
document.getElementById('nav-root').innerHTML = renderNav('qrcode.html');
let qrSize = 200;
let qrObj = null;

function generate() {
  const type = document.getElementById('qr-type').value;
  let text = document.getElementById('qr-input').value.trim();
  document.getElementById('wifi-fields').style.display = type === 'wifi' ? 'block' : 'none';

  if (type === 'wifi') {
    const ssid = document.getElementById('wifi-ssid').value;
    const pass = document.getElementById('wifi-pass').value;
    const sec  = document.getElementById('wifi-sec').value;
    text = `WIFI:T:${sec};S:${ssid};P:${pass};;`;
  }

  if (!text) { document.getElementById('qr-canvas').innerHTML = ''; return; }

  const fg = document.getElementById('qr-fg').value;
  const bg = document.getElementById('qr-bg').value;
  const ecc = { L:QRCode.CorrectLevel.L, M:QRCode.CorrectLevel.M, Q:QRCode.CorrectLevel.Q, H:QRCode.CorrectLevel.H };
  const level = document.getElementById('qr-ecc').value;

  document.getElementById('qr-canvas').innerHTML = '';
  try {
    qrObj = new QRCode(document.getElementById('qr-canvas'), {
      text, width: qrSize, height: qrSize,
      colorDark: fg, colorLight: bg,
      correctLevel: ecc[level]
    });
    document.getElementById('qr-info').textContent = `${text.length} chars · ${qrSize}×${qrSize}px`;
  } catch(e) {
    document.getElementById('qr-canvas').innerHTML = `<div class="text-danger text-sm" style="padding:20px;">Content too long for selected error correction level</div>`;
  }
}

function setSize(s, btn) {
  qrSize = s;
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  generate();
}

function applyPreset(fg, bg) {
  document.getElementById('qr-fg').value = fg;
  document.getElementById('qr-bg').value = bg;
  generate();
}

function autoFill() {
  const type = document.getElementById('qr-type').value;
  const map = {
    url:'https://', email:'mailto:you@example.com',
    phone:'tel:+1234567890', sms:'sms:+1234567890',
    text:'', wifi:'', vcard:'BEGIN:VCARD\nVERSION:3.0\nFN:John Doe\nTEL:+1234567890\nEMAIL:john@example.com\nEND:VCARD'
  };
  if (map[type] !== undefined) document.getElementById('qr-input').value = map[type];
  document.getElementById('wifi-fields').style.display = type==='wifi' ? 'block' : 'none';
  generate();
}

function getCanvas() {
  return document.querySelector('#qr-canvas canvas') || document.querySelector('#qr-canvas img');
}

function download(fmt) {
  const el = getCanvas();
  if (!el) return;
  const canvas = el.tagName==='CANVAS' ? el : (() => { const c=document.createElement('canvas'); c.width=qrSize; c.height=qrSize; const ctx=c.getContext('2d'); ctx.drawImage(el,0,0); return c; })();
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'qrcode.png';
  a.click();
}

function copyImg() {
  const el = getCanvas();
  if (!el) return;
  const canvas = el.tagName==='CANVAS' ? el : (() => { const c=document.createElement('canvas'); c.width=qrSize; c.height=qrSize; const ctx=c.getContext('2d'); ctx.drawImage(el,0,0); return c; })();
  canvas.toBlob(blob => navigator.clipboard.write([new ClipboardItem({'image/png':blob})]).then(()=>showToast('Copied!','success')));
}

generate();
</script>
</body>
</html>
